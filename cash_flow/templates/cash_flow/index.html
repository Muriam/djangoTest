<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет ДДС</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .positive { color: green; font-weight: bold; }
        .negative { color: red; font-weight: bold; }
        .filter-card { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .table-actions { white-space: nowrap; }
    </style>
</head>

<body>
    <div class="container mt-4">
        <h1 class="mb-4">Учет движения денежных средств</h1>
        
        <!-- Фильтры -->
        <div class="filter-card">
            <h5>Фильтры</h5>
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Дата от</label>
                    <input type="date" id="filter-date-from" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Дата до</label>
                    <input type="date" id="filter-date-to" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Статус</label>
                    <select id="filter-status" class="form-select">
                        <option value="">Все статусы</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Тип</label>
                    <select id="filter-type" class="form-select">
                        <option value="">Все типы</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Категория</label>
                    <select id="filter-category" class="form-select">
                        <option value="">Все категории</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Подкатегория</label>
                    <select id="filter-subcategory" class="form-select">
                        <option value="">Все подкатегории</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="applyFilters()">Применить</button>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-secondary w-100" onclick="resetFilters()">Сбросить</button>
                </div>
            </div>
        </div>
        
        <!-- Кнопка добавления -->
        <div class="mb-3">
            <button class="btn btn-success" onclick="showAddForm()">+ Добавить операцию</button>
        </div>
        
        <!-- Таблица -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Дата</th>
                        <th>Статус</th>
                        <th>Тип</th>
                        <th>Категория</th>
                        <th>Подкатегория</th>
                        <th>Сумма</th>
                        <th>Комментарий</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="transactions-list">
                    <tr><td colspan="8" class="text-center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div class="modal fade" id="transactionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Добавить операцию</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="transactionForm">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label class="form-label">Дата *</label>
                            <input type="date" id="date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Статус *</label>
                            <select id="status" class="form-select" required>
                                <option value="">Выберите статус</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Тип операции *</label>
                            <select id="type" class="form-select" required>
                                <option value="">Выберите тип</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Категория *</label>
                            <select id="category" class="form-select" required>
                                <option value="">Сначала выберите тип</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Подкатегория *</label>
                            <select id="subcategory" class="form-select" required>
                                <option value="">Сначала выберите категорию</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Сумма (руб) *</label>
                            <input type="number" step="0.01" id="amount" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Комментарий</label>
                            <textarea id="comment" class="form-control" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button class="btn btn-primary" onclick="saveTransaction()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/cash_flow/js/script.js"></script>
</body>

</html>
