{% extends 'base.html' %}

{% block title %}{{ dict_title }}{% endblock %}

{% block content %}
<h1 class="mb-3">{{ dict_title }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a class="btn btn-outline-secondary" href="{{ cancel_url }}">Отмена</a>
    </div>
</form>
{% endblock %}
