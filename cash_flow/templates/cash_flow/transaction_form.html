{% extends 'base.html' %}

{% block title %}Операция{% endblock %}

{% block content %}
<h1 class="mb-3">
    {% if form.instance.pk %}
        Редактирование операции
    {% else %}
        Создание операции
    {% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a class="btn btn-outline-secondary" href="{% url 'cashflow:transaction_list' %}">Назад</a>
    </div>
</form>

<script>
    const transactionTypeSelect = document.getElementById('id_transaction_type');
    const categorySelect = document.getElementById('id_category');
    const subcategorySelect = document.getElementById('id_subcategory');

    const categoriesByTypeUrl = "{% url 'cashflow:ajax_categories_by_type' %}";
    const subcategoriesByCategoryUrl = "{% url 'cashflow:ajax_subcategories_by_category' %}";

    function setOptions(selectEl, items, placeholder, preserveValue) {
        // selectEl может быть null, если форма редактирования без некоторых полей.
        if (!selectEl) return;

        // Сохраняем текущее значение, чтобы при ошибках валидации не терять выбор пользователя.
        const currentValue = preserveValue ? selectEl.value : '';

        // Очищаем текущие варианты и пересобираем выпадающий список.
        selectEl.innerHTML = '';

        // Добавляем плейсхолдер.
        const placeholderOpt = document.createElement('option');
        placeholderOpt.value = '';
        placeholderOpt.textContent = placeholder;
        selectEl.appendChild(placeholderOpt);

        // Заполняем <select> данными с сервера.
        for (const item of items) {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.textContent = item.name;
            selectEl.appendChild(opt);
        }

        // Восстанавливаем выбранное значение, если оно есть среди доступных опций.
        if (preserveValue && currentValue) {
            selectEl.value = currentValue;
        }
    }

    async function loadCategories(preserveSelection) {
        const transactionTypeId = transactionTypeSelect?.value || '';

        if (!transactionTypeId) {
            setOptions(categorySelect, [], 'Выберите тип', false);
            setOptions(subcategorySelect, [], 'Сначала выберите категорию', false);
            return;
        }

        try {
            const resp = await fetch(
                categoriesByTypeUrl + `?transaction_type_id=${encodeURIComponent(transactionTypeId)}`
            );
            const data = await resp.json();

            setOptions(categorySelect, data.categories || [], 'Выберите категорию', preserveSelection);

            // При смене типа операции подкатегории нужно очистить,
            // но на повторном показе формы (после ошибки) выбор нужно сохранить.
            if (!preserveSelection) {
                setOptions(subcategorySelect, [], 'Сначала выберите категорию', false);
            }
        } catch (e) {
            setOptions(categorySelect, [], 'Выберите категорию', false);
            if (!preserveSelection) {
                setOptions(subcategorySelect, [], 'Сначала выберите категорию', false);
            }
        }
    }

    async function loadSubcategories(preserveSelection) {
        const categoryId = categorySelect?.value || '';

        if (!categoryId) {
            setOptions(subcategorySelect, [], 'Сначала выберите категорию', false);
            return;
        }

        try {
            const resp = await fetch(
                subcategoriesByCategoryUrl + `?category_id=${encodeURIComponent(categoryId)}`
            );
            const data = await resp.json();

            setOptions(subcategorySelect, data.subcategories || [], 'Выберите подкатегорию', preserveSelection);
        } catch (e) {
            setOptions(subcategorySelect, [], 'Выберите подкатегорию', false);
        }
    }

    // обработчики изменения выбора.
    transactionTypeSelect?.addEventListener('change', () => loadCategories(false));
    categorySelect?.addEventListener('change', () => loadSubcategories(false));

    // На случай повторной отправки/редактирования формы
    // подгружаются категории/подкатегории для текущих значений.
    if (transactionTypeSelect?.value) {
        loadCategories(true).then(() => {
            if (categorySelect?.value) {
                loadSubcategories(true);
            }
        });
    }
</script>
{% endblock %}
