{% extends 'base.html' %}

{% block title %}{{ dict_title }}{% endblock %}

{% block content %}
<h1 class="mb-3">{{ dict_title }}</h1>

<div class="alert alert-warning">
    Вы уверены, что хотите удалить запись?
</div>

<div class="mb-3">
    <strong>Объект:</strong> {{ object }}
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a class="btn btn-outline-secondary ms-2" href="{{ cancel_url }}">Отмена</a>
</form>
{% endblock %}
